cases:
  - id: group-permission-001
    title: 엄마 기록을 가족 그룹에만 공유한다
    given:
      actor: me
      subject: mom
      selected_groups:
        - family
      groups:
        family: [me, mom, dad, sibling]
        mom_grandma: [me, mom, grandma]
        friends: [me, friend]
    expected:
      visible_to_groups: [family]
      hidden_from_groups: [mom_grandma, friends]
      must_not_happen:
        - selected_groups에 없는 그룹에 자동 공유
        - subject가 없는 그룹에 노출

  - id: group-permission-002
    title: 엄마와 할머니 그룹에는 엄마 기록을 공유할 수 있다
    given:
      actor: me
      subject: mom
      selected_groups:
        - mom_grandma
      groups:
        family: [me, mom, dad, sibling]
        mom_grandma: [me, mom, grandma]
    expected:
      visible_to_groups: [mom_grandma]
      hidden_from_groups: [family]

  - id: group-permission-003
    title: 기록 대상자가 없는 그룹은 공유 후보에서 제외한다
    given:
      actor: me
      subject: mom
      groups:
        friends: [me, friend]
    expected:
      selectable_groups: []
      reason: 기록 대상자인 mom이 friends 그룹에 포함되어 있지 않음
